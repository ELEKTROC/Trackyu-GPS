# Flow E2E — Navigation onglets (rôle CLIENT/STAFF)
# Enchaîne après login et vérifie que chaque onglet est accessible.

appId: com.trackyugps.app
---
- runFlow: 01_login.yaml

- tapOn:
    text: "Carte"
- assertVisible:
    text: "Carte"
    timeout: 4000

- tapOn:
    text: "Flotte"
- assertVisible:
    text: "Flotte"
    timeout: 4000

- tapOn:
    text: "Rapports"
- assertVisible:
    text: "Rapports"
    timeout: 4000

- tapOn:
    text: "Paramètres"
- assertVisible:
    text: "Paramètres"
    timeout: 4000
