services:
  # --- DATA LAYER ---
  postgres:
    image: timescale/timescaledb:latest-pg14
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-fleet_user}
      POSTGRES_PASSWORD: ${DB_PASS:-fleet_password}
      POSTGRES_DB: ${DB_NAME:-fleet_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # --- APPLICATION LAYER ---
  backend:
    build: ./backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-fleet_user}:${DB_PASS:-fleet_password}@postgres:5432/${DB_NAME:-fleet_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ORANGE_SMS_CLIENT_ID: ${ORANGE_SMS_CLIENT_ID}
      ORANGE_SMS_CLIENT_SECRET: ${ORANGE_SMS_CLIENT_SECRET}
      ORANGE_SMS_SENDER_NAME: ${ORANGE_SMS_SENDER_NAME}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./backend/dist:/app/dist
      - ./backend/migrations:/app/migrations
    ports:
      - "3001:3001" # API
      - "5001:5000" # GPS TCP Port (Host:5001 -> Container:5000)
    depends_on:
      - postgres
      - redis

  frontend:
    image: nginx:alpine
    restart: always
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx_host.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
