# /etc/nginx/sites-available/trackyu

# --- APPLICATION (live.trackyugps.com) ---
# Note: Le site vitrine (trackyugps.com) est hébergé sur un serveur mutualisé séparé.
# Cette configuration ne gère que l'application SaaS sur le VPS.

server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Static Assets (JS, CSS, images) with long cache
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve APK downloads
    location /downloads/ {
        add_header Content-Type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="TrackYuGPS.apk"';
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Serve React App (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API requests to Backend Service
    location /api {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSockets (Socket.IO)
    location /socket.io {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
