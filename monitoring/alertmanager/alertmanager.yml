# Alertmanager — TrackYu GPS
#
# Routing simplifié : tous les receivers pointent vers le webhook backend
# (POST /api/v1/system/alerts) qui dispatche ensuite vers email Resend +
# Socket.IO + INSERT system_alerts. Centralise la logique de routing côté
# backend (modifiable sans restart Alertmanager) et utilise les helpers
# existants (emailService, socket throttle, audit DB).
#
# Variables substituées par envsubst au démarrage du container :
#   $ALERTMANAGER_WEBHOOK_TOKEN — token shared, vérifié backend en constant-time
#   $BACKEND_WEBHOOK_URL        — URL interne backend (défaut http://172.17.0.1:3001)

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'backend-webhook'

  routes:
    # Critical → notification immédiate, repeat 1h
    - match:
        severity: critical
      receiver: 'backend-webhook'
      group_wait: 0s
      repeat_interval: 1h

    # Warning → groupé, repeat 4h
    - match:
        severity: warning
      receiver: 'backend-webhook'
      repeat_interval: 4h

    # Info → faible priorité, repeat 12h
    - match:
        severity: info
      receiver: 'backend-webhook'
      repeat_interval: 12h

receivers:
  - name: 'backend-webhook'
    webhook_configs:
      - url: '${BACKEND_WEBHOOK_URL}/api/v1/system/alerts'
        send_resolved: true
        max_alerts: 0  # 0 = no limit
        http_config:
          authorization:
            type: Bearer
            credentials: '${ALERTMANAGER_WEBHOOK_TOKEN}'

# Inhibe les alertes warning quand une critical du même alertname est active
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
