name: TrackYu GPS - CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Frontend Checks ──────────────────────────────────────────────
  frontend:
    name: Frontend (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx eslint --max-warnings 50 "contexts/**/*.{ts,tsx}" "hooks/**/*.{ts,tsx}" "features/**/*.{ts,tsx}" "components/**/*.{ts,tsx}" "services/**/*.{ts,tsx}"
        continue-on-error: true  # Warning-only for now

      - name: Check formatting
        run: npx prettier --check "contexts/**/*.{ts,tsx}" "hooks/**/*.ts" "services/**/*.ts"
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(stat -f%z dist/assets/index.*.js 2>/dev/null || stat -c%s dist/assets/index.*.js 2>/dev/null)
          MAIN_KB=$((MAIN_SIZE / 1024))
          echo "Main bundle: ${MAIN_KB} KB"
          if [ "$MAIN_KB" -gt 1000 ]; then
            echo "::warning::Main bundle is ${MAIN_KB} KB (target: < 800 KB)"
          fi

  # ─── Backend Checks ───────────────────────────────────────────────
  backend:
    name: Backend (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings 50 "src/**/*.ts"
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        run: npx jest --verbose --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-32-characters!!

      - name: Build
        run: npm run build

  # ─── Security Audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit frontend dependencies
        run: npm audit --audit-level=critical || true
        working-directory: .

      - name: Audit backend dependencies
        run: npm audit --audit-level=critical || true
        working-directory: ./backend

      - name: Check for secrets in code
        run: |
          # Check for common secret patterns in tracked files
          if git grep -iE '(password|secret|api_key|token)\s*[:=]\s*["\x27][^"\x27]{8,}' -- ':(exclude)*.md' ':(exclude)*.lock' ':(exclude)package*.json' ':(exclude).github/*' ':(exclude)*.test.*' ':(exclude)*.sql' ':(exclude)docker-compose*' ':(exclude)*.ini' ':(exclude)*.txt' ':(exclude)INSTRUCTIONS/*'; then
            echo "::warning::Potential secrets found in source code. Please review."
          else
            echo "No obvious secrets detected."
          fi
