name: TrackYu GPS - CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend (tsc + lint + test + build)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), 'contexts/') ||
      contains(toJson(github.event.pull_request.changed_files), 'features/') ||
      contains(toJson(github.event.pull_request.changed_files), 'components/') ||
      contains(toJson(github.event.pull_request.changed_files), 'services/') ||
      contains(toJson(github.event.pull_request.changed_files), 'hooks/') ||
      contains(toJson(github.event.pull_request.changed_files), 'schemas/') ||
      contains(toJson(github.event.pull_request.changed_files), 'types') ||
      contains(toJson(github.event.pull_request.changed_files), 'vite.config') ||
      contains(toJson(github.event.pull_request.changed_files), 'tsconfig')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript — 0 erreur obligatoire
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint --max-warnings 0 "contexts/**/*.{ts,tsx}" "hooks/**/*.{ts,tsx}" "features/**/*.{ts,tsx}" "components/**/*.{ts,tsx}" "services/**/*.{ts,tsx}"
        continue-on-error: true

      - name: Tests
        run: npx vitest run --reporter=verbose

      - name: Build production
        run: npm run build

      - name: Bundle size check
        run: |
          TOTAL=$(du -sb dist/assets/*.js 2>/dev/null | awk '{s+=$1} END {print s}')
          TOTAL_KB=$((TOTAL / 1024))
          echo "JS total: ${TOTAL_KB} KB"
          if [ "$TOTAL_KB" -gt 4000 ]; then
            echo "::warning::Bundle total ${TOTAL_KB} KB — target < 4 MB"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Frontend CI" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Mobile ───────────────────────────────────────────────────────
  mobile:
    name: Mobile Expo (tsc + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trackyu-mobile-expo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: trackyu-mobile-expo/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript — 0 erreur obligatoire
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint --max-warnings 20 "src/**/*.{ts,tsx}"
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Mobile CI" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Security ─────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit frontend
        run: npm audit --audit-level=critical || true

      - name: Audit mobile
        run: npm audit --audit-level=critical || true
        working-directory: trackyu-mobile-expo

      - name: Scan secrets
        run: |
          if git grep -iE '(password|secret|api_key|token)\s*[:=]\s*["\x27][^"\x27]{8,}' \
            -- ':(exclude)*.md' ':(exclude)*.lock' ':(exclude)package*.json' \
               ':(exclude).github/*' ':(exclude)*.test.*' ':(exclude)*.sql' \
               ':(exclude)docker-compose*' ':(exclude)*.ini' ':(exclude)*.txt' \
               ':(exclude)INSTRUCTIONS/*'; then
            echo "::warning::Secrets potentiels détectés — vérifier avant merge."
          else
            echo "Aucun secret détecté."
          fi
